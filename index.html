<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeans Collection — Fazii Brand</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0a0f1e;
    --denim: #1a3a5c;
    --light-denim: #2d6a9f;
    --accent: #e8b84b;
    --white: #f5f5f0;
    --gray: #8a8a8a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--navy);
    color: var(--white);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
  }

  /* NAV */
  nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 40px;
    background: rgba(10,15,30,0.95);
    border-bottom: 1px solid rgba(232,184,75,0.2);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 4px;
    color: var(--accent);
  }
  .nav-links { display: flex; gap: 28px; }
  .nav-links a {
    color: var(--white);
    text-decoration: none;
    font-size: 0.85rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.7;
    transition: opacity 0.2s;
  }
  .nav-links a:hover, .nav-links a.active { opacity: 1; color: var(--accent); }
  .cart-btn {
    background: var(--accent);
    color: var(--navy);
    border: none;
    padding: 8px 20px;
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
  }

  /* HERO BANNER */
  .hero {
    background: linear-gradient(135deg, var(--denim) 0%, var(--navy) 60%);
    padding: 70px 40px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: 'JEANS';
    position: absolute;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20vw;
    color: rgba(255,255,255,0.03);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    white-space: nowrap;
    pointer-events: none;
  }
  .hero h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3rem, 8vw, 6rem);
    letter-spacing: 8px;
    color: var(--white);
    line-height: 1;
  }
  .hero h1 span { color: var(--accent); }
  .hero p {
    margin-top: 14px;
    color: var(--gray);
    font-size: 0.95rem;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .hero-tag {
    display: inline-block;
    margin-top: 24px;
    background: var(--accent);
    color: var(--navy);
    padding: 6px 20px;
    font-weight: 700;
    font-size: 0.8rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    border-radius: 2px;
  }

  /* FILTER BAR */
  .filter-bar {
    display: flex;
    gap: 12px;
    padding: 24px 40px;
    overflow-x: auto;
    border-bottom: 1px solid rgba(255,255,255,0.07);
  }
  .filter-btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--gray);
    padding: 8px 20px;
    font-family: 'Outfit', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    white-space: nowrap;
    transition: all 0.2s;
  }
  .filter-btn:hover, .filter-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(232,184,75,0.08);
  }

  /* PRODUCTS GRID */
  .section-title {
    padding: 40px 40px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .section-title h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    letter-spacing: 4px;
    color: var(--white);
  }
  .section-title span {
    font-size: 0.8rem;
    color: var(--gray);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 2px;
    padding: 0 40px 60px;
  }

  .product-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.3s, border-color 0.3s;
    position: relative;
  }
  .product-card:hover {
    transform: translateY(-4px);
    border-color: rgba(232,184,75,0.3);
    z-index: 2;
  }

  .product-img {
    width: 100%;
    height: 340px;
    object-fit: cover;
    object-position: top;
    display: block;
    transition: transform 0.4s;
  }
  .product-card:hover .product-img { transform: scale(1.04); }

  .badge {
    position: absolute;
    top: 14px;
    left: 14px;
    background: var(--accent);
    color: var(--navy);
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 2px;
  }

  .product-info {
    padding: 20px;
  }
  .product-name {
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 1px;
    color: var(--white);
    margin-bottom: 6px;
  }
  .product-desc {
    font-size: 0.8rem;
    color: var(--gray);
    margin-bottom: 14px;
    line-height: 1.5;
  }
  .product-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .price {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    color: var(--accent);
    letter-spacing: 2px;
  }
  .add-cart-btn {
    background: var(--denim);
    border: 1px solid rgba(232,184,75,0.3);
    color: var(--white);
    padding: 8px 16px;
    font-family: 'Outfit', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
  }
  .add-cart-btn:hover {
    background: var(--accent);
    color: var(--navy);
    border-color: var(--accent);
  }

  /* SIZE SELECTOR */
  .sizes {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
  }
  .size-btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--gray);
    width: 32px;
    height: 32px;
    font-family: 'Outfit', sans-serif;
    font-size: 0.72rem;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
  }
  .size-btn:hover, .size-btn.selected {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(232,184,75,0.1);
  }

  /* CART OVERLAY */
  .cart-overlay {
    position: fixed;
    top: 0; right: -420px;
    width: 400px;
    height: 100vh;
    background: #0d1525;
    border-left: 1px solid rgba(232,184,75,0.2);
    z-index: 999;
    transition: right 0.35s ease;
    display: flex;
    flex-direction: column;
  }
  .cart-overlay.open { right: 0; }
  .cart-header {
    padding: 24px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .cart-header h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 3px;
    color: var(--accent);
  }
  .close-cart {
    background: none;
    border: none;
    color: var(--white);
    font-size: 1.4rem;
    cursor: pointer;
    opacity: 0.6;
  }
  .cart-items { flex: 1; overflow-y: auto; padding: 20px 24px; }
  .cart-empty { text-align: center; color: var(--gray); padding: 60px 0; font-size: 0.9rem; letter-spacing: 1px; }
  .cart-item {
    display: flex;
    gap: 14px;
    padding: 14px 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .cart-item img { width: 70px; height: 85px; object-fit: cover; object-position: top; border-radius: 2px; }
  .cart-item-info { flex: 1; }
  .cart-item-name { font-weight: 600; font-size: 0.9rem; margin-bottom: 4px; }
  .cart-item-size { font-size: 0.75rem; color: var(--gray); margin-bottom: 8px; }
  .cart-item-price { font-family: 'Bebas Neue', sans-serif; color: var(--accent); letter-spacing: 1px; }
  .remove-item { background: none; border: none; color: var(--gray); cursor: pointer; font-size: 1.1rem; }
  .cart-footer { padding: 20px 24px; border-top: 1px solid rgba(255,255,255,0.08); }
  .cart-total {
    display: flex;
    justify-content: space-between;
    margin-bottom: 16px;
    font-weight: 600;
  }
  .cart-total span:last-child { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; color: var(--accent); letter-spacing: 2px; }
  .whatsapp-order {
    display: block;
    width: 100%;
    background: #25d366;
    color: #000;
    border: none;
    padding: 14px;
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 3px;
    text-align: center;
    text-decoration: none;
  }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 500;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #0d1525;
    border: 1px solid rgba(232,184,75,0.2);
    max-width: 800px;
    width: 100%;
    border-radius: 4px;
    overflow: hidden;
    display: grid;
    grid-template-columns: 1fr 1fr;
  }
  .modal-img { width: 100%; height: 450px; object-fit: cover; object-position: top; }
  .modal-info { padding: 36px 30px; }
  .modal-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    letter-spacing: 3px;
    margin-bottom: 10px;
  }
  .modal-desc { color: var(--gray); font-size: 0.88rem; line-height: 1.7; margin-bottom: 20px; }
  .modal-price { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--accent); letter-spacing: 3px; margin-bottom: 20px; }
  .modal-label { font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; color: var(--gray); margin-bottom: 10px; }
  .modal-sizes { display: flex; gap: 8px; margin-bottom: 24px; }
  .modal-add-btn {
    width: 100%;
    background: var(--accent);
    color: var(--navy);
    border: none;
    padding: 14px;
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    margin-bottom: 10px;
  }
  .close-modal {
    position: absolute;
    top: 16px; right: 16px;
    background: rgba(0,0,0,0.5);
    border: none;
    color: white;
    width: 36px; height: 36px;
    border-radius: 50%;
    font-size: 1.1rem;
    cursor: pointer;
  }
  .modal-overlay { position: relative; }

  /* FLOATING WHATSAPP */
  .wa-float {
    position: fixed;
    bottom: 28px;
    right: 28px;
    background: #25d366;
    color: #000;
    width: 56px; height: 56px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    text-decoration: none;
    box-shadow: 0 4px 20px rgba(37,211,102,0.4);
    z-index: 200;
    transition: transform 0.2s;
  }
  .wa-float:hover { transform: scale(1.1); }

  @media (max-width: 600px) {
    nav { padding: 14px 18px; }
    .nav-links { display: none; }
    .products-grid { padding: 0 14px 40px; grid-template-columns: 1fr 1fr; }
    .products-grid .product-img { height: 220px; }
    .section-title, .filter-bar { padding-left: 14px; padding-right: 14px; }
    .hero { padding: 50px 18px; }
    .modal { grid-template-columns: 1fr; }
    .modal-img { height: 260px; }
    .cart-overlay { width: 100%; right: -100%; }
  }
</style>
</head>
<body>

<nav>
  <div class="logo">Fazii Brand</div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="#" class="active">Jeans Suit</a>
    <a href="#">Trak Suit</a>
    <a href="#">Lady Suit</a>
    <a href="#">Shalwar Kameez</a>
  </div>
  <button class="cart-btn" onclick="toggleCart()">🛒 Cart (<span id="cart-count">0</span>)</button>
</nav>

<!-- HERO -->
<div class="hero">
  <h1>JEANS <span>COLLECTION</span></h1>
  <p>Premium Denim — Fazii Brand Pakistan</p>
  <span class="hero-tag">New Arrivals 2025</span>
</div>

<!-- FILTER BAR -->
<div class="filter-bar">
  <button class="filter-btn active" onclick="filterProducts('all', this)">All</button>
  <button class="filter-btn" onclick="filterProducts('casual', this)">Casual</button>
  <button class="filter-btn" onclick="filterProducts('formal', this)">Formal</button>
  <button class="filter-btn" onclick="filterProducts('summer', this)">Summer</button>
  <button class="filter-btn" onclick="filterProducts('winter', this)">Winter</button>
</div>

<!-- PRODUCTS -->
<div class="section-title">
  <h2>Jeans Suits</h2>
  <span id="product-count">9 Products</span>
</div>

<div class="products-grid" id="products-grid">
  <!-- Cards injected by JS -->
</div>

<!-- CART OVERLAY -->
<div class="cart-overlay" id="cart-overlay">
  <div class="cart-header">
    <h3>Your Cart</h3>
    <button class="close-cart" onclick="toggleCart()">✕</button>
  </div>
  <div class="cart-items" id="cart-items">
    <div class="cart-empty">Cart is empty.<br>Add some products!</div>
  </div>
  <div class="cart-footer">
    <div class="cart-total">
      <span>Total</span>
      <span id="cart-total">Rs. 0</span>
    </div>
    <a id="whatsapp-btn" href="#" class="whatsapp-order" target="_blank">📲 Order on WhatsApp</a>
  </div>
</div>

<!-- PRODUCT MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal" id="modal">
    <img id="modal-img" src="" alt="" class="modal-img">
    <div class="modal-info">
      <div class="modal-name" id="modal-name"></div>
      <div class="modal-desc" id="modal-desc"></div>
      <div class="modal-price" id="modal-price"></div>
      <div class="modal-label">Select Size</div>
      <div class="modal-sizes" id="modal-sizes"></div>
      <button class="modal-add-btn" onclick="addFromModal()">Add to Cart</button>
    </div>
  </div>
</div>

<!-- FLOATING WA -->
<a href="https://wa.me/923XXXXXXXXX" class="wa-float" target="_blank">💬</a>

<script>
const products = [
  {
    id: 1,
    name: "Classic Navy Jeans Set",
    desc: "Premium denim fabric, slim fit, ideal for casual outings and beach vibes.",
    price: 3200,
    tag: "casual",
    badge: "Bestseller",
    img: "https://images.unsplash.com/photo-1519085360753-af0119f7cbe7?w=500&q=80"
  },
  {
    id: 2,
    name: "Cargo Denim Co-ord",
    desc: "Multi-pocket denim cargo suit. Relaxed fit, rugged style for everyday wear.",
    price: 3800,
    tag: "casual",
    badge: null,
    img: "https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=500&q=80"
  },
  {
    id: 3,
    name: "Light Wash Jeans Suit",
    desc: "Soft light-wash denim suit. Breezy and comfortable for summer days.",
    price: 2900,
    tag: "summer",
    badge: "New",
    img: "https://images.unsplash.com/photo-1618886614638-80e3c103d31a?w=500&q=80"
  },
  {
    id: 4,
    name: "Dark Indigo Formal Jeans",
    desc: "Dark indigo slim-cut jeans suit. Smart casual for meetings and events.",
    price: 4200,
    tag: "formal",
    badge: "Premium",
    img: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=500&q=80"
  },
  {
    id: 5,
    name: "Track Jeans Combo",
    desc: "Sporty jeans with matching jacket. Street style at its finest.",
    price: 3500,
    tag: "casual",
    badge: null,
    img: "https://images.unsplash.com/photo-1552374196-1ab2a1c593e8?w=500&q=80"
  },
  {
    id: 6,
    name: "Olive Denim Suit",
    desc: "Olive-tone denim fabric with sharp cut. Trendy and eye-catching.",
    price: 3600,
    tag: "summer",
    badge: "Hot",
    img: "https://images.unsplash.com/photo-1617137968427-85924c800a22?w=500&q=80"
  },
  {
    id: 7,
    name: "Winter Fleece Jeans Set",
    desc: "Fleece-lined denim for cold weather. Warm without compromising style.",
    price: 4800,
    tag: "winter",
    badge: "Winter",
    img: "https://images.unsplash.com/photo-1490367532201-b9bc1dc483f6?w=500&q=80"
  },
  {
    id: 8,
    name: "Eid Special Jeans Suit",
    desc: "Festive denim collection. Clean stitching, celebration-ready fit.",
    price: 4000,
    tag: "formal",
    badge: "Sale",
    img: "https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=500&q=80"
  },
  {
    id: 9,
    name: "Dubai Cut Polo Jeans",
    desc: "Polo shirt paired with premium chino-denim trousers. Urban luxury.",
    price: 3300,
    tag: "casual",
    badge: null,
    img: "https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=500&q=80"
  }
];

const sizes = ['S','M','L','XL','XXL'];
let cart = [];
let currentProduct = null;
let selectedSize = null;

function renderProducts(filter='all') {
  const grid = document.getElementById('products-grid');
  const filtered = filter === 'all' ? products : products.filter(p => p.tag === filter);
  document.getElementById('product-count').textContent = filtered.length + ' Products';
  grid.innerHTML = filtered.map(p => `
    <div class="product-card" onclick="openModal(${p.id})">
      ${p.badge ? `<div class="badge">${p.badge}</div>` : ''}
      <img src="${p.img}" alt="${p.name}" class="product-img">
      <div class="product-info">
        <div class="product-name">${p.name}</div>
        <div class="product-desc">${p.desc}</div>
        <div class="sizes">
          ${sizes.map(s => `<button class="size-btn" onclick="selectSize(event,'${s}')">${s}</button>`).join('')}
        </div>
        <div class="product-meta">
          <div class="price">Rs. ${p.price.toLocaleString()}</div>
          <button class="add-cart-btn" onclick="quickAdd(event,${p.id})">Add to Cart</button>
        </div>
      </div>
    </div>
  `).join('');
}

function selectSize(e, size) {
  e.stopPropagation();
  const card = e.target.closest('.product-card');
  card.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
  e.target.classList.add('selected');
}

function quickAdd(e, id) {
  e.stopPropagation();
  const card = e.target.closest('.product-card');
  const selected = card.querySelector('.size-btn.selected');
  const size = selected ? selected.textContent : 'M';
  const product = products.find(p => p.id === id);
  addToCart(product, size);
}

function openModal(id) {
  currentProduct = products.find(p => p.id === id);
  selectedSize = 'M';
  document.getElementById('modal-img').src = currentProduct.img;
  document.getElementById('modal-name').textContent = currentProduct.name;
  document.getElementById('modal-desc').textContent = currentProduct.desc;
  document.getElementById('modal-price').textContent = 'Rs. ' + currentProduct.price.toLocaleString();
  document.getElementById('modal-sizes').innerHTML = sizes.map(s =>
    `<button class="size-btn${s==='M'?' selected':''}" onclick="selectModalSize(this,'${s}')">${s}</button>`
  ).join('');
  document.getElementById('modal-overlay').classList.add('open');
}

function selectModalSize(btn, size) {
  document.querySelectorAll('#modal-sizes .size-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedSize = size;
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('modal-overlay')) {
    document.getElementById('modal-overlay').classList.remove('open');
  }
}

function addFromModal() {
  if (!currentProduct) return;
  addToCart(currentProduct, selectedSize || 'M');
  document.getElementById('modal-overlay').classList.remove('open');
}

function addToCart(product, size) {
  cart.push({ ...product, size, cartId: Date.now() + Math.random() });
  updateCart();
  toggleCart();
}

function updateCart() {
  document.getElementById('cart-count').textContent = cart.length;
  const total = cart.reduce((s, i) => s + i.price, 0);
  document.getElementById('cart-total').textContent = 'Rs. ' + total.toLocaleString();
  const cartEl = document.getElementById('cart-items');
  if (cart.length === 0) {
    cartEl.innerHTML = '<div class="cart-empty">Cart is empty.<br>Add some products!</div>';
  } else {
    cartEl.innerHTML = cart.map(item => `
      <div class="cart-item">
        <img src="${item.img}" alt="${item.name}">
        <div class="cart-item-info">
          <div class="cart-item-name">${item.name}</div>
          <div class="cart-item-size">Size: ${item.size}</div>
          <div class="cart-item-price">Rs. ${item.price.toLocaleString()}</div>
        </div>
        <button class="remove-item" onclick="removeItem(${item.cartId})">✕</button>
      </div>
    `).join('');
  }
  // WhatsApp message
  const msg = cart.map(i => `• ${i.name} (Size: ${i.size}) — Rs. ${i.price.toLocaleString()}`).join('\n');
  const totalMsg = `\nTotal: Rs. ${total.toLocaleString()}`;
  const wa = encodeURIComponent(`Hello Fazii Brand! 👋\nI want to order:\n${msg}${totalMsg}\nPlease confirm!`);
  document.getElementById('whatsapp-btn').href = `https://wa.me/923XXXXXXXXX?text=${wa}`;
}

function removeItem(cartId) {
  cart = cart.filter(i => i.cartId !== cartId);
  updateCart();
}

function toggleCart() {
  document.getElementById('cart-overlay').classList.toggle('open');
}

function filterProducts(tag, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderProducts(tag);
}

renderProducts();
</script>
</body>
