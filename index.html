<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAZII BRAND</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial,sans-serif;background:#0d0d0d;color:#fff;}
nav{background:#0d0d0d;padding:16px 30px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #222;position:sticky;top:0;z-index:200;}
.logo{color:#c9a84c;font-size:20px;font-weight:700;letter-spacing:3px;}
.cart-btn{background:#c9a84c;color:#0d0d0d;border:none;padding:9px 18px;border-radius:4px;cursor:pointer;font-weight:700;font-size:13px;}
.cart-count{background:#fff;color:#0d0d0d;border-radius:50%;width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;margin-left:4px;}

/* PAGES */
.page{display:none;}
.page.active{display:block;}

/* HOME */
.hero{padding:60px 30px;text-align:center;border-bottom:1px solid #1a1a1a;}
.hero h1{font-size:36px;color:#fff;margin-bottom:8px;}
.hero h1 span{color:#c9a84c;}
.hero p{color:#777;font-size:14px;margin-bottom:24px;}
.btn-gold{background:#c9a84c;color:#0d0d0d;padding:12px 32px;border:none;border-radius:3px;font-size:14px;font-weight:700;cursor:pointer;}

.products-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;padding:40px 30px;}
.pcard{background:#151515;border:1px solid #222;border-radius:8px;overflow:hidden;cursor:pointer;transition:all 0.2s;}
.pcard:hover{border-color:#c9a84c;transform:translateY(-4px);}
.pcard img{width:100%;height:200px;object-fit:cover;}
.pcard-body{padding:14px;}
.pcard-name{font-size:14px;font-weight:700;margin-bottom:4px;}
.pcard-fabric{font-size:11px;color:#555;margin-bottom:8px;}
.pcard-price{font-size:16px;color:#c9a84c;font-weight:700;}
.pcard-footer{display:flex;justify-content:space-between;align-items:center;margin-top:12px;}
.view-btn{background:transparent;color:#c9a84c;border:1px solid #c9a84c;padding:6px 14px;border-radius:3px;font-size:12px;cursor:pointer;}
.view-btn:hover{background:#c9a84c;color:#0d0d0d;}

/* DETAIL PAGE */
.detail{padding:30px;}
.back-btn{background:transparent;color:#c9a84c;border:none;font-size:13px;cursor:pointer;margin-bottom:24px;display:flex;align-items:center;gap:6px;}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:40px;max-width:900px;}
.detail-img{width:100%;border-radius:8px;height:400px;object-fit:cover;}
.detail-tag{color:#c9a84c;font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}
.detail-name{font-size:28px;font-weight:700;margin-bottom:8px;}
.detail-price{font-size:26px;color:#c9a84c;font-weight:700;margin-bottom:16px;}
.detail-desc{color:#888;font-size:13px;line-height:1.7;margin-bottom:20px;}
.detail-features{margin-bottom:24px;}
.detail-features li{color:#aaa;font-size:13px;margin-bottom:6px;list-style:none;padding-left:16px;position:relative;}
.detail-features li::before{content:'✓';color:#c9a84c;position:absolute;left:0;}
.size-label{font-size:12px;color:#777;margin-bottom:8px;}
.sizes{display:flex;gap:8px;margin-bottom:20px;}
.size-btn{width:38px;height:38px;border:1px solid #333;background:transparent;color:#aaa;border-radius:4px;cursor:pointer;font-size:13px;}
.size-btn.active,.size-btn:hover{border-color:#c9a84c;color:#c9a84c;}
.add-cart-btn{width:100%;padding:14px;background:#c9a84c;color:#0d0d0d;border:none;border-radius:4px;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:10px;}
.add-cart-btn:hover{background:#e0bc5a;}
.wa-order-btn{width:100%;padding:12px;background:#25D366;color:#fff;border:none;border-radius:4px;font-size:14px;font-weight:700;cursor:pointer;}

/* CART PAGE */
.cart-page{padding:30px;max-width:700px;margin:0 auto;}
.cart-page h2{font-size:22px;margin-bottom:24px;color:#c9a84c;}
.cart-item{display:flex;gap:16px;background:#151515;border:1px solid #222;border-radius:8px;padding:14px;margin-bottom:12px;align-items:center;}
.cart-item img{width:70px;height:70px;object-fit:cover;border-radius:4px;}
.cart-item-info{flex:1;}
.cart-item-name{font-size:14px;font-weight:700;margin-bottom:3px;}
.cart-item-size{font-size:12px;color:#666;margin-bottom:6px;}
.cart-item-price{font-size:15px;color:#c9a84c;font-weight:700;}
.remove-btn{background:transparent;color:#555;border:none;cursor:pointer;font-size:18px;}
.remove-btn:hover{color:#e24b4a;}
.cart-total{background:#151515;border:1px solid #c9a84c;border-radius:8px;padding:20px;margin-top:20px;}
.total-row{display:flex;justify-content:space-between;font-size:14px;color:#aaa;margin-bottom:8px;}
.total-final{display:flex;justify-content:space-between;font-size:18px;font-weight:700;color:#c9a84c;margin-top:12px;padding-top:12px;border-top:1px solid #333;}
.checkout-btn{width:100%;padding:14px;background:#c9a84c;color:#0d0d0d;border:none;border-radius:4px;font-size:15px;font-weight:700;cursor:pointer;margin-top:16px;}
.empty-cart{text-align:center;padding:60px 20px;color:#555;}
.empty-cart p{font-size:16px;margin-bottom:16px;}

/* TOAST */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#c9a84c;color:#0d0d0d;padding:12px 24px;border-radius:4px;font-weight:700;font-size:13px;display:none;z-index:999;}

/* WA FLOAT */
.wa-float{position:fixed;bottom:24px;right:24px;background:#25D366;color:#fff;width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;text-decoration:none;z-index:998;}

@media(max-width:600px){
  .detail-grid{grid-template-columns:1fr;}
  .detail-img{height:260px;}
}
</style>
</head>
<body>

<nav>
  <div class="logo">FAZII BRAND</div>
  <button class="cart-btn" onclick="showPage('cart')">
    Cart <span class="cart-count" id="cartCount">0</span>
  </button>
</nav>

<!-- HOME PAGE -->
<div id="homePage" class="page active">
  <div class="hero">
    <h1>Style Jo Bolti Hai<br><span>Aapki Shakhsiyat</span></h1>
    <p>Har suit ek kahani — sirf aapke liye tailored • Faisalabad</p>
    <button class="btn-gold" onclick="document.getElementById('productsSection').scrollIntoView({behavior:'smooth'})">Collection Dekhein</button>
  </div>
  <div id="productsSection" class="products-grid" id="productsGrid"></div>
</div>

<!-- DETAIL PAGE -->
<div id="detailPage" class="page">
  <div class="detail">
    <button class="back-btn" onclick="showPage('home')">← Wapas Jao</button>
    <div class="detail-grid">
      <div><img id="detailImg" src="" alt=""></div>
      <div>
        <div class="detail-tag">FAZII BRAND</div>
        <div class="detail-name" id="detailName"></div>
        <div class="detail-price" id="detailPrice"></div>
        <div class="detail-desc" id="detailDesc"></div>
        <ul class="detail-features" id="detailFeatures"></ul>
        <div class="size-label">Size chunein:</div>
        <div class="sizes">
          <button class="size-btn active" onclick="selectSize(this)">S</button>
          <button class="size-btn" onclick="selectSize(this)">M</button>
          <button class="size-btn" onclick="selectSize(this)">L</button>
          <button class="size-btn" onclick="selectSize(this)">XL</button>
          <button class="size-btn" onclick="selectSize(this)">XXL</button>
        </div>
        <button class="add-cart-btn" onclick="addToCart()">+ Add to Cart</button>
        <button class="wa-order-btn" onclick="waOrder()">WhatsApp pe Order Karein</button>
      </div>
    </div>
  </div>
</div>

<!-- CART PAGE -->
<div id="cartPage" class="page">
  <div class="cart-page">
    <button class="back-btn" onclick="showPage('home')">← Shopping Jaari Rakhein</button>
    <h2>Aapki Cart</h2>
    <div id="cartItems"></div>
    <div id="cartSummary"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<a class="wa-float" href="https://wa.me/923221022052?text=Assalam%20o%20Alaikum!%20Fazii%20Brand%20se%20order%20karna%20hai" target="_blank">💬</a>

<script>
const WA_NUMBER = '923001234567';

const products = [
  {id:1, name:'Sherwani Premium', fabric:'Silk Blend • Gold Embroidery', price:1800, img:'https://images.unsplash.com/photo-1594938298603-c8148c4b1c5a?w=500&h=400&fit=crop', desc:'Hamare behtareen Sherwani collection ka hissa — shadi aur khaas mauqon ke liye bilkul perfect. Silk blend fabric aur gold embroidery ke saath har koi aapko dekhta reh jayega.', features:['Silk blend fabric','Hand embroidery','Custom fitting','3-5 din mein ready']},
  {id:2, name:'Formal 3-Piece', fabric:'Wool Blend • Slim Fit', price:1800, img:'https://images.unsplash.com/photo-1507679799987-c73779587ccf?w=500&h=400&fit=crop', desc:'Office aur formal occasions ke liye best choice. Wool blend fabric jo har mausam mein comfortable rahe. Slim fit design jo aapki personality ko highlight kare.', features:['Wool blend fabric','Slim fit cut','Jacket + Shirt + Trouser','Professional look']},
  {id:3, name:'Shalwar Kameez', fabric:'Lawn Cotton • Casual', price:1800, img:'https://images.unsplash.com/photo-1619603364853-33bcd0d68b00?w=500&h=400&fit=crop', desc:'Rozmarra ke liye best suit — comfortable aur stylish. Premium cotton fabric jo poore din fresh aur acha feel karaye.', features:['Premium cotton','Comfortable fit','Easy to wash','Daily wear perfect']},
  {id:4, name:'Dulha Special', fabric:'Heavy Embroidery • Wedding', price:1800, img:'https://images.unsplash.com/photo-1583744946564-b52ac1c389c8?w=500&h=400&fit=crop', desc:'Aapki shadi ki sabse khaas raat ke liye — Dulha Special. Bhaari embroidery aur premium fabric se bana hua yeh suit aapko sab se alag dikhayega.', features:['Heavy zari embroidery','Premium fabric','Dupatta included','Dry clean recommended']},
  {id:5, name:'Casual Kurta', fabric:'Cotton • Relaxed Fit', price:1800, img:'https://images.unsplash.com/photo-1489987707025-afc232f7ea0f?w=500&h=400&fit=crop', desc:'Ghar mein baithe ya dosto ke saath — Casual Kurta har jagah perfect. Soft cotton fabric aur relaxed fit jo aapko poora din comfortable rakhe.', features:['Soft cotton fabric','Relaxed fit','Multiple colors','Machine washable']},
  {id:6, name:'Winter Karandi', fabric:'Karandi • Warm Fabric', price:1800, img:'https://images.unsplash.com/photo-1520367445093-50dc08a59d9d?w=500&h=400&fit=crop', desc:'Sardiyon ka best companion — Winter Karandi suit. Warm fabric jo thand mein bhi stylish rakhe. Traditional look with modern comfort.', features:['Warm karandi fabric','Traditional design','Full suit set','Winter special']},
];

let cart = [];
let currentProduct = null;
let selectedSize = 'M';

function renderProducts(){
  const grid = document.getElementById('productsSection');
  grid.innerHTML = products.map(p => `
    <div class="pcard" onclick="showDetail(${p.id})">
      <img src="${p.img}" alt="${p.name}">
      <div class="pcard-body">
        <div class="pcard-name">${p.name}</div>
        <div class="pcard-fabric">${p.fabric}</div>
        <div class="pcard-footer">
          <div class="pcard-price">Rs. ${p.price.toLocaleString()}</div>
          <button class="view-btn">Detail Dekhein</button>
        </div>
      </div>
    </div>
  `).join('');
}

function showDetail(id){
  currentProduct = products.find(p => p.id === id);
  document.getElementById('detailImg').src = currentProduct.img;
  document.getElementById('detailName').textContent = currentProduct.name;
  document.getElementById('detailPrice').textContent = 'Rs. ' + currentProduct.price.toLocaleString();
  document.getElementById('detailDesc').textContent = currentProduct.desc;
  document.getElementById('detailFeatures').innerHTML = currentProduct.features.map(f => `<li>${f}</li>`).join('');
  selectedSize = 'M';
  document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.size-btn')[1].classList.add('active');
  showPage('detail');
  window.scrollTo(0,0);
}

function selectSize(btn){
  document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedSize = btn.textContent;
}

function addToCart(){
  if(!currentProduct) return;
  const existing = cart.find(i => i.id === currentProduct.id && i.size === selectedSize);
  if(existing){ existing.qty++; }
  else { cart.push({...currentProduct, size: selectedSize, qty: 1}); }
  updateCartCount();
  showToast(currentProduct.name + ' cart mein add ho gaya!');
}

function removeFromCart(id, size){
  cart = cart.filter(i => !(i.id === id && i.size === size));
  updateCartCount();
  renderCart();
}

function updateCartCount(){
  const total = cart.reduce((s,i) => s + i.qty, 0);
  document.getElementById('cartCount').textContent = total;
}

function renderCart(){
  const container = document.getElementById('cartItems');
  const summary = document.getElementById('cartSummary');
  if(cart.length === 0){
    container.innerHTML = '<div class="empty-cart"><p>Cart khali hai!</p><button class="btn-gold" onclick="showPage(\'home\')">Shopping Karein</button></div>';
    summary.innerHTML = '';
    return;
  }
  container.innerHTML = cart.map(item => `
    <div class="cart-item">
      <img src="${item.img}" alt="${item.name}">
      <div class="cart-item-info">
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-size">Size: ${item.size} • Qty: ${item.qty}</div>
        <div class="cart-item-price">Rs. ${(item.price * item.qty).toLocaleString()}</div>
      </div>
      <button class="remove-btn" onclick="removeFromCart(${item.id}, '${item.size}')">✕</button>
    </div>
  `).join('');
  const subtotal = cart.reduce((s,i) => s + i.price * i.qty, 0);
  summary.innerHTML = `
    <div class="cart-total">
      <div class="total-row"><span>Subtotal</span><span>Rs. ${subtotal.toLocaleString()}</span></div>
      <div class="total-row"><span>Delivery</span><span>Free</span></div>
      <div class="total-final"><span>Total</span><span>Rs. ${subtotal.toLocaleString()}</span></div>
      <button class="checkout-btn" onclick="whatsappCheckout()">WhatsApp pe Order Complete Karein</button>
    </div>
  `;
}

function whatsappCheckout(){
  const items = cart.map(i => `${i.name} (Size: ${i.size}) x${i.qty} = Rs.${i.price*i.qty}`).join('%0A');
  const total = cart.reduce((s,i) => s + i.price*i.qty, 0);
  const msg = `Assalam o Alaikum! Fazii Brand Order:%0A%0A${items}%0A%0ATotal: Rs.${total}`;
  window.open(`https://wa.me/${WA_NUMBER}?text=${msg}`, '_blank');
}

function waOrder(){
  if(!currentProduct) return;
  const msg = `Assalam o Alaikum! Mujhe ${currentProduct.name} chahiye (Size: ${selectedSize}) - Rs.${currentProduct.price}`;
  window.open(`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
}

function showPage(page){
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  if(page === 'home') document.getElementById('homePage').classList.add('active');
  else if(page === 'detail') document.getElementById('detailPage').classList.add('active');
  else if(page === 'cart'){ document.getElementById('cartPage').classList.add('active'); renderCart(); }
  window.scrollTo(0,0);
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2500);
}

renderProducts();
</script>
</body>
</html>
